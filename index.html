<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ブロック崩し</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="game">
      <canvas id="myCanvas" width="480" height="320"></canvas>
      <div id="gameOverlay" class="game-overlay" hidden>
        <div class="game-overlay__panel" role="status" aria-live="polite">
          <p id="gameResult" class="game-overlay__title"></p>
          <p id="gameScore" class="game-overlay__score"></p>
          <button id="restartButton" class="game-overlay__button" type="button">
            もう一度
          </button>
        </div>
      </div>
    </main>
    <script src="game.js"></script>
  </body>
</html>
